<!DOCTYPE html>
<html>
<head>
    <title> General Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #cc3333;
            text-align: center;
            margin-top: 60px;
        }

        .calculator {
            background-color:#FFFF00;
            width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 20px;
        }

        #display {
            width: 90%;
            height: 50px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 15px;
            padding: 5px;
        }

        button {
            width: 100px;
            height: 50px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #cc3333;
        }
    </style>

    <script>
        function appendValue(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function calculateResult() {
            try {
                document.getElementById("display").value =
                    eval(document.getElementById("display").value);
            } catch {
                alert("Invalid Expression");
            }
        }
    </script>

</head>

<body>

    <div class="calculator">
        <h2>General Calculator</h2>

        
        <input type="text" id="display" readonly>

        <br>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('4')">4</button>
        <br>
		
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <br>

        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('+')">ADD(+)</button>
        <button onclick="appendValue('-')">SUB(-)</button>
        <br>

        <button onclick="appendValue('*')">MUL(*)</button>
        <button onclick="appendValue('%')">MOD(%)</button>
        <button onclick="appendValue('/')">DIV(/)</button>
		 <button onclick="clearDisplay()">CLR</button>
        <br>
        <button onclick="appendvalue('^')">pow(^)</button>
        <button onclick="calculateResult()">RESULT</button>
    </div>
	

</body>
</html>
